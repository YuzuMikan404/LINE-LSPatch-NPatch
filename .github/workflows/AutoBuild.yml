name: Patch LINE (Config Driven)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: '強制的に再ビルドする'
        type: boolean
        default: false

env:
  SOURCE_REPO: "YuzuMikan404/LINE-APK"
  KEYSTORE_FILE: "keystore.jks"
  STORE_PASSWORD: "your_store_password"
  KEY_ALIAS: "key0"
  KEY_PASSWORD: "your_store_password"

jobs:
  # ==========================================
  # ジョブ1: LIMEs更新チェック ＆ バージョンリストの読み込み
  # ==========================================
  check-release:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      lime_tag: ${{ steps.check.outputs.lime_tag }}
      target_tag: ${{ steps.check.outputs.target_tag }}
      matrix: ${{ steps.prepare-matrix.outputs.matrix }} # ★JSONを次のジョブに渡す
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read versions.json
        id: prepare-matrix
        run: |
          # versions.json を読み込んで、改行を消したJSON文字列として出力
          MATRIX_JSON=$(jq -c . versions.json)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

      - name: Check Latest LIMEs Release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIME_TAG=$(gh release list --repo areteruhiro/LIMEs --limit 1 --json tagName --jq '.[0].tagName')
          TARGET_TAG="LIMEs-${LIME_TAG}"
          
          echo "lime_tag=$LIME_TAG" >> $GITHUB_OUTPUT
          echo "target_tag=$TARGET_TAG" >> $GITHUB_OUTPUT

          if [ "${{ github.event.inputs.force_run }}" == "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if gh release view "$TARGET_TAG" > /dev/null 2>&1; then
            echo "✅ すでに最新のリリースが存在します。スキップします。"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "🚀 新しいリリースを検知しました！"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # ジョブ2: 外部設定(JSON)に基づく並列ビルド
  # ==========================================
  build-patch:
    needs: check-release
    if: needs.check-release.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # ★ここで前のジョブで読み込んだ versions.json を展開！
        include: ${{ fromJson(needs.check-release.outputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Prepare Keystore (JKS → PKCS12 for NPatch)
        run: |
          mkdir -p keystore
          cp "${{ env.KEYSTORE_FILE }}" keystore/original.jks

          keytool -importkeystore \
            -srckeystore keystore/original.jks \
            -srcstoretype JKS \
            -destkeystore keystore/keystore.p12 \
            -deststoretype PKCS12 \
            -srcstorepass "${{ env.STORE_PASSWORD }}" \
            -deststorepass "${{ env.STORE_PASSWORD }}" \
            -srcalias "${{ env.KEY_ALIAS }}" \
            -destalias "${{ env.KEY_ALIAS }}" \
            -srckeypass "${{ env.KEY_PASSWORD }}" \
            -destkeypass "${{ env.KEY_PASSWORD }}" > /dev/null 2>&1 || echo "⚠️ PKCS12変換失敗"

          if [ -f "keystore/keystore.p12" ]; then
            echo "KEYSTORE_P12=keystore/keystore.p12" >> $GITHUB_ENV
          else
            echo "KEYSTORE_P12=keystore/original.jks" >> $GITHUB_ENV
          fi

      - name: Download Tools & LIMEs Module
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_LS_TAG=$(gh release list --repo JingMatrix/LSPatch --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$LATEST_LS_TAG" --repo JingMatrix/LSPatch --pattern "lspatch.jar" --output "lspatch.jar" --clobber
          
          LATEST_NP_TAG=$(gh release list --repo 7723mod/NPatch --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$LATEST_NP_TAG" --repo 7723mod/NPatch --pattern "NPatch-*-release.jar" --output "NPatch.jar" --clobber || \
            wget -O NPatch.jar https://github.com/7723mod/NPatch/releases/download/v0.7.3/NPatch-v0.7.3-504-release.jar
          
          wget -O APKEditor.jar "https://github.com/REAndroid/APKEditor/releases/download/V1.4.7/APKEditor-1.4.7.jar"
          
          gh release download "${{ needs.check-release.outputs.lime_tag }}" --repo areteruhiro/LIMEs --pattern "*.apk" --output "module.apk" --clobber

      - name: Download LINE APK/APKM (${{ matrix.version }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p download_tmp
          
          # バージョン名をそのままタグ名として指定してダウンロードを試みる
          # タグ名が "15.12.2" の場合と "v15.12.2" の場合の両方に対応できるようにします
          TAG_NAME="${{ matrix.version }}"
          
          echo "Checking release tag: $TAG_NAME"
          if gh release download "$TAG_NAME" --repo "$SOURCE_REPO" --pattern "*" --dir download_tmp; then
            echo "Successfully downloaded from tag: $TAG_NAME"
          elif gh release download "v$TAG_NAME" --repo "$SOURCE_REPO" --pattern "*" --dir download_tmp; then
            echo "Successfully downloaded from tag: v$TAG_NAME"
          else
            echo "❌ Error: Release tag for version $TAG_NAME not found in $SOURCE_REPO"
            exit 1
          fi
          
          # ダウンロードしたファイルの中からAPK/APKM等を探す
          FILE_PATH=$(find download_tmp -type f \( -name "*.apk" -o -name "*.apkm" -o -name "*.xapk" -o -name "*.apks" \) | head -n 1)
          
          if [ -z "$FILE_PATH" ]; then
            echo "❌ Error: No APK file found in the downloaded assets."
            exit 1
          fi
          
          mv "$FILE_PATH" raw_input.file
          echo "Downloaded: $(basename raw_input.file)"

      - name: Prepare APK (Merge & Maximize Version Code)
        run: |
          # 準備：作業用ディレクトリの作成
          mkdir -p apk_working_dir

          if unzip -l raw_input.file | grep -q "base.apk"; then
            # 1. 分割APK（APKMなど）の場合：展開して作業ディレクトリへ
            unzip -o raw_input.file -d apk_working_dir
          else
            # 2. 単体APKの場合：そのまま作業ディレクトリへ（base.apkとして配置）
            cp raw_input.file apk_working_dir/base.apk
          fi

          # 3. APKEditor の merge (m) コマンドで結合しつつ versionCode を最大化
          # mergeコマンドは単体APKが入ったフォルダに対しても有効で、
          # -vc オプションで versionCode を直接上書きできます。
          java -jar APKEditor.jar m -i apk_working_dir -o target.apk -vc 2147483647
          
          # 確認ログ
          echo "✅ APK preparation and versionCode maximization completed."

      - name: Apply LSPatch & NPatch
        run: |
          mkdir -p out_ls_local out_ls_embed out_np_local out_np_embed

          java -Xmx4G -jar lspatch.jar target.apk -l 2 -f -o out_ls_local
          mv $(find out_ls_local -name "*.apk" | head -n 1) ls_local_unsigned.apk

          java -Xmx4G -jar lspatch.jar target.apk -m module.apk -l 2 -f -o out_ls_embed
          mv $(find out_ls_embed -name "*.apk" | head -n 1) ls_embed_unsigned.apk

          java -Xmx4G -jar NPatch.jar target.apk -k ${{ env.KEYSTORE_P12 }} ${{ env.STORE_PASSWORD }} ${{ env.KEY_ALIAS }} ${{ env.KEY_PASSWORD }} -f -o out_np_local
          mv $(find out_np_local -name "*.apk" | head -n 1) "LINE-${{ matrix.version }}-NPatch-Local.apk"

          java -Xmx4G -jar NPatch.jar target.apk -m module.apk -k ${{ env.KEYSTORE_P12 }} ${{ env.STORE_PASSWORD }} ${{ env.KEY_ALIAS }} ${{ env.KEY_PASSWORD }} -f -o out_np_embed
          mv $(find out_np_embed -name "*.apk" | head -n 1) "LINE-${{ matrix.version }}-NPatch-Embed.apk"

      - name: Sign LSPatch APKs
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)

          "$BUILD_TOOLS_DIR/zipalign" -p 4 ls_local_unsigned.apk ls_local_aligned.apk
          "$BUILD_TOOLS_DIR/apksigner" sign --ks "${{ env.KEYSTORE_FILE }}" --ks-pass pass:"${{ env.STORE_PASSWORD }}" --ks-key-alias "${{ env.KEY_ALIAS }}" --key-pass pass:"${{ env.KEY_PASSWORD }}" --out "LINE-${{ matrix.version }}-LSPatch-Local.apk" ls_local_aligned.apk

          "$BUILD_TOOLS_DIR/zipalign" -p 4 ls_embed_unsigned.apk ls_embed_aligned.apk
          "$BUILD_TOOLS_DIR/apksigner" sign --ks "${{ env.KEYSTORE_FILE }}" --ks-pass pass:"${{ env.STORE_PASSWORD }}" --ks-key-alias "${{ env.KEY_ALIAS }}" --key-pass pass:"${{ env.KEY_PASSWORD }}" --out "LINE-${{ matrix.version }}-LSPatch-Embed.apk" ls_embed_aligned.apk

      - name: Upload APKs to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: patched-apks-${{ matrix.version }}
          path: |
            LINE-${{ matrix.version }}-LSPatch-Local.apk
            LINE-${{ matrix.version }}-LSPatch-Embed.apk
            LINE-${{ matrix.version }}-NPatch-Local.apk
            LINE-${{ matrix.version }}-NPatch-Embed.apk
          retention-days: 1

  # ==========================================
  # ジョブ3: 外部設定(JSON & MD)を統合してリリース作成
  # ==========================================
  publish-release:
    needs: [check-release, build-patch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all APKs from Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-apks
          merge-multiple: true

      - name: Process Release Template
        env:
          LIME_TAG: ${{ needs.check-release.outputs.lime_tag }}
        run: |
          # 1. versions.json から Markdown のリスト形式を生成
          # 例: - **安定版 (Stable):** `15.12.2`
          VERSION_LIST_MD=$(jq -r '.[] | "- **\(.label):** `\(.version)`"' versions.json)
          
          # 2. Pythonを使ってテンプレート内の変数を安全に置換する
          # (sedだと複数行のリスト置換でエラーになりやすいため、Pythonが確実)
          python3 -c "
          import os
          
          # テンプレート読み込み
          with open('release_template.md', 'r', encoding='utf-8') as f:
              content = f.read()
          
          # プレースホルダーを環境変数や生成したリストで置換
          lime_tag = os.environ['LIME_TAG']
          version_list = \"\"\"$VERSION_LIST_MD\"\"\"
          
          content = content.replace('{{LIME_TAG}}', lime_tag)
          content = content.replace('{{VERSION_LIST}}', version_list)
          
          # 結果を書き出し
          with open('final_release_body.md', 'w', encoding='utf-8') as f:
              f.write(content)
          "

      - name: Create Unified Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.target_tag }}
          name: LIMEs ${{ needs.check-release.outputs.lime_tag }} (Patched LINEs)
          body_path: final_release_body.md
          files: release-apks/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
