name: Patch LINE (new)

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: '強制的に再ビルドする'
        type: boolean
        default: false

env:
  SOURCE_REPO: "YuzuMikan404/LINE-APK"
  KEYSTORE_FILE: "NPatch-keystore.bks"
  STORE_PASSWORD: "123456"
  KEY_ALIAS: "key0"
  KEY_PASSWORD: "123456"

jobs:
  # ==========================================
  # ジョブ1: LIMEs更新チェック ＆ バージョンリストの読み込み
  # ==========================================
  check-release:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      lime_tag: ${{ steps.check.outputs.lime_tag }}
      target_tag: ${{ steps.check.outputs.target_tag }}
      matrix: ${{ steps.prepare-matrix.outputs.matrix }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Read versions.json
        id: prepare-matrix
        run: |
          MATRIX_JSON=$(jq -c . versions.json)
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

      - name: Check Latest LIMEs Release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIME_TAG=$(gh release list --repo areteruhiro/LIMEs --limit 1 --json tagName --jq '.[0].tagName')
          TARGET_TAG="LIMEs-${LIME_TAG}"

          echo "lime_tag=$LIME_TAG" >> $GITHUB_OUTPUT
          echo "target_tag=$TARGET_TAG" >> $GITHUB_OUTPUT

          if [ "${{ github.event.inputs.force_run }}" == "true" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if gh release view "$TARGET_TAG" > /dev/null 2>&1; then
            echo "✅ すでに最新のリリースが存在します。スキップします。"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "🚀 新しいリリースを検知しました！"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # ジョブ2: 外部設定(JSON)に基づく並列ビルド
  # ==========================================
  build-patch:
    needs: check-release
    if: needs.check-release.outputs.skip == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.check-release.outputs.matrix) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # BKS → PKCS12 変換（BouncyCastleプロバイダ使用）
      - name: Prepare Keystore (BKS → PKCS12 for apksigner/NPatch)
        run: |
          mkdir -p keystore

          # BouncyCastleプロバイダをダウンロード（BKS形式の読み込みに必要）
          wget -q -O bcprov.jar "https://repo1.maven.org/maven2/org/bouncycastle/bcprov-jdk18on/1.78/bcprov-jdk18on-1.78.jar"

          keytool -importkeystore \
            -srckeystore "${{ env.KEYSTORE_FILE }}" \
            -srcstoretype BKS \
            -srcprovidername BC \
            -providerclass org.bouncycastle.jce.provider.BouncyCastleProvider \
            -providerpath bcprov.jar \
            -destkeystore keystore/keystore.p12 \
            -deststoretype PKCS12 \
            -srcstorepass "${{ env.STORE_PASSWORD }}" \
            -deststorepass "${{ env.STORE_PASSWORD }}" \
            -srcalias "${{ env.KEY_ALIAS }}" \
            -destalias "${{ env.KEY_ALIAS }}" \
            -srckeypass "${{ env.KEY_PASSWORD }}" \
            -destkeypass "${{ env.KEY_PASSWORD }}" \
            -noprompt

          if [ -f "keystore/keystore.p12" ]; then
            echo "✅ PKCS12変換成功"
            echo "KEYSTORE_P12=keystore/keystore.p12" >> $GITHUB_ENV
          else
            echo "❌ PKCS12変換失敗"
            exit 1
          fi

      - name: Download Tools & LIMEs Module
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_LS_TAG=$(gh release list --repo JingMatrix/LSPatch --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$LATEST_LS_TAG" --repo JingMatrix/LSPatch --pattern "lspatch.jar" --output "lspatch.jar" --clobber
          LATEST_NP_TAG=$(gh release list --repo 7723mod/NPatch --limit 1 --json tagName --jq '.[0].tagName')
          gh release download "$LATEST_NP_TAG" --repo 7723mod/NPatch --pattern "NPatch-*-release.jar" --output "NPatch.jar" --clobber || wget -O NPatch.jar https://github.com/7723mod/NPatch/releases/download/v0.7.3/NPatch-v0.7.3-504-release.jar
          wget -O APKEditor.jar "https://github.com/REAndroid/APKEditor/releases/download/V1.4.7/APKEditor-1.4.7.jar"
          gh release download "${{ needs.check-release.outputs.lime_tag }}" --repo areteruhiro/LIMEs --pattern "*.apk" --output "module.apk" --clobber

      - name: Download LINE APK/APKM (${{ matrix.version }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p download_tmp
          TAG_NAME="${{ matrix.version }}"
          if ! gh release download "$TAG_NAME" --repo "$SOURCE_REPO" --pattern "*" --dir download_tmp; then
            gh release download "v$TAG_NAME" --repo "$SOURCE_REPO" --pattern "*" --dir download_tmp
          fi
          FILE_PATH=$(find download_tmp -type f \( -name "*.apk" -o -name "*.apkm" -o -name "*.xapk" -o -name "*.apks" \) | head -n 1)
          mv "$FILE_PATH" raw_input.file

      - name: Prepare APK (Merge & Rewrite Version)
        run: |
          mkdir -p apk_working_dir
          if unzip -l raw_input.file | grep -q "base.apk"; then
            unzip -o raw_input.file -d apk_working_dir
            java -jar APKEditor.jar m -i apk_working_dir -o merged_temp.apk
          else
            cp raw_input.file merged_temp.apk
          fi
          java -jar APKEditor.jar d -t xml -i merged_temp.apk -o decoded_work

          # versionCode: 元の値より大きくPlay Storeの自動更新を抑制しつつ異常値と判定されない値
          sed -i 's/android:versionCode="[0-9]*"/android:versionCode="99999999"/' decoded_work/AndroidManifest.xml

          # versionName: Obtainium用に「ラベル-LIMEsタグ」形式にする
          # 例: Stable-LIMEs-v1.36.1.0.alpha
          FULL_VER_NAME="${{ matrix.label }}-${{ needs.check-release.outputs.target_tag }}"
          sed -i "s/android:versionName=\"[^\"]*\"/android:versionName=\"$FULL_VER_NAME\"/" decoded_work/AndroidManifest.xml

          java -jar APKEditor.jar b -i decoded_work -o target.apk

      - name: Apply LSPatch & NPatch
        run: |
          mkdir -p out_ls_local out_ls_embed out_np_local out_np_embed

          # LSPatch Local（未署名で出力、後段のapksignerで署名）
          java -Xmx4G -jar lspatch.jar target.apk -l 2 -f -o out_ls_local
          echo "=== out_ls_local ==="
          ls -la out_ls_local/
          FOUND=$(find out_ls_local -name "*.apk" | head -n 1)
          [ -z "$FOUND" ] && echo "❌ LSPatch Local: 出力ファイルが見つかりません" && exit 1
          mv "$FOUND" ls_local_unsigned.apk
          echo "✅ LSPatch Local: $FOUND"

          # LSPatch Embed（未署名で出力、後段のapksignerで署名）
          java -Xmx4G -jar lspatch.jar target.apk -m module.apk -l 2 -f -o out_ls_embed
          echo "=== out_ls_embed ==="
          ls -la out_ls_embed/
          FOUND=$(find out_ls_embed -name "*.apk" | head -n 1)
          [ -z "$FOUND" ] && echo "❌ LSPatch Embed: 出力ファイルが見つかりません" && exit 1
          mv "$FOUND" ls_embed_unsigned.apk
          echo "✅ LSPatch Embed: $FOUND"

          # NPatch Local
          java -Xmx4G -jar NPatch.jar target.apk \
            -k "${{ env.KEYSTORE_P12 }}" "${{ env.STORE_PASSWORD }}" "${{ env.KEY_ALIAS }}" "${{ env.KEY_PASSWORD }}" \
            -f -o out_np_local
          echo "=== out_np_local ==="
          ls -la out_np_local/
          FOUND=$(find out_np_local -name "*.apk" | head -n 1)
          [ -z "$FOUND" ] && echo "❌ NPatch Local: 出力ファイルが見つかりません" && exit 1
          mv "$FOUND" "${{ matrix.label }}-NPatch-Local.apk"
          echo "✅ NPatch Local 完了"

          # NPatch Embed
          java -Xmx4G -jar NPatch.jar target.apk -m module.apk \
            -k "${{ env.KEYSTORE_P12 }}" "${{ env.STORE_PASSWORD }}" "${{ env.KEY_ALIAS }}" "${{ env.KEY_PASSWORD }}" \
            -f -o out_np_embed
          echo "=== out_np_embed ==="
          ls -la out_np_embed/
          FOUND=$(find out_np_embed -name "*.apk" | head -n 1)
          [ -z "$FOUND" ] && echo "❌ NPatch Embed: 出力ファイルが見つかりません" && exit 1
          mv "$FOUND" "${{ matrix.label }}-NPatch-Embed.apk"
          echo "✅ NPatch Embed 完了"

      # LSPatch出力をzipalign → apksignerで署名（PKCS12キーストア使用）
      - name: Sign LSPatch APKs
        run: |
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Using build-tools: $BUILD_TOOLS_DIR"

          "$BUILD_TOOLS_DIR/zipalign" -p 4 ls_local_unsigned.apk ls_local_aligned.apk
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "${{ env.KEYSTORE_P12 }}" \
            --ks-pass pass:"${{ env.STORE_PASSWORD }}" \
            --ks-key-alias "${{ env.KEY_ALIAS }}" \
            --key-pass pass:"${{ env.KEY_PASSWORD }}" \
            --out "${{ matrix.label }}-LSPatch-Local.apk" \
            ls_local_aligned.apk
          echo "✅ LSPatch Local 署名完了"

          "$BUILD_TOOLS_DIR/zipalign" -p 4 ls_embed_unsigned.apk ls_embed_aligned.apk
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks "${{ env.KEYSTORE_P12 }}" \
            --ks-pass pass:"${{ env.STORE_PASSWORD }}" \
            --ks-key-alias "${{ env.KEY_ALIAS }}" \
            --key-pass pass:"${{ env.KEY_PASSWORD }}" \
            --out "${{ matrix.label }}-LSPatch-Embed.apk" \
            ls_embed_aligned.apk
          echo "✅ LSPatch Embed 署名完了"

      - name: Upload APKs to Artifact
        uses: actions/upload-artifact@v4
        with:
          name: patched-apks-${{ matrix.label }}
          path: |
            ${{ matrix.label }}-LSPatch-Local.apk
            ${{ matrix.label }}-LSPatch-Embed.apk
            ${{ matrix.label }}-NPatch-Local.apk
            ${{ matrix.label }}-NPatch-Embed.apk
          retention-days: 1

  # ==========================================
  # ジョブ3: 外部設定(JSON & MD)を統合してリリース作成
  # ==========================================
  publish-release:
    needs: [check-release, build-patch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download all APKs from Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-apks
          merge-multiple: true

      - name: Process Release Template
        env:
          LIME_TAG: ${{ needs.check-release.outputs.lime_tag }}
        run: |
          VERSION_LIST_MD=$(jq -r '.[] | "- **\(.label):** `\(.version)`"' versions.json)

          python3 -c "
          import os

          with open('release_template.md', 'r', encoding='utf-8') as f:
              content = f.read()

          lime_tag = os.environ['LIME_TAG']
          version_list = \"\"\"$VERSION_LIST_MD\"\"\"

          content = content.replace('{{LIME_TAG}}', lime_tag)
          content = content.replace('{{VERSION_LIST}}', version_list)

          with open('final_release_body.md', 'w', encoding='utf-8') as f:
              f.write(content)
          "

      - name: Create Unified Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.target_tag }}
          name: LIMEs ${{ needs.check-release.outputs.lime_tag }} (Patched LINEs)
          body_path: final_release_body.md
          files: release-apks/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
